name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Validate tag matches project version
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "${GITHUB_REF_NAME}" = "v${version}"

      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Generate release checksums
        run: |
          (
            cd dist
            sha256sum semantic_scholar_tool-* > SHA256SUMS
          )

      - name: Verify wheel install
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install --no-deps dist/*.whl
          .venv-wheel/bin/python -c "import semantic_scholar_tool"
          .venv-wheel/bin/semantic-scholar --help >/dev/null

      - name: Verify sdist install
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip setuptools wheel
          .venv-sdist/bin/python -m pip install --no-build-isolation dist/*.tar.gz
          .venv-sdist/bin/python -c "import semantic_scholar_tool"
          .venv-sdist/bin/semantic-scholar --help >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: semantic-scholar-cli-dist
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: semantic-scholar-cli-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.whl
            dist/SHA256SUMS
