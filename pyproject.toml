[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "semantic-scholar-tool"
version = "0.1.0"
description = "Semantic Scholar Academic Graph CLI"
requires-python = ">=3.11"

[project.scripts]
sem = "semantic_scholar_tool.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
